# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['dist/index.js'],
      env: {
        DATABASE_URL: config.databaseUrl || '',
        JWT_SECRET: config.jwtSecret,
        SUPABASE_URL: config.supabaseUrl || '',
        SUPABASE_ANON_KEY: config.supabaseAnonKey || '',
        SHRINK_CHAT_API_URL: config.shrinkChatApiUrl || 'https://couchloopchat.com',
        NODE_ENV: 'production'
      }
    })
  configSchema:
    type: object
    properties:
      databaseUrl:
        type: string
        description: PostgreSQL connection string for session and checkpoint storage (e.g. postgresql://user:pass@host:5432/db)
      jwtSecret:
        type: string
        description: Secret key for JWT tokens — minimum 32 characters. Required for secure operation.
        minLength: 32
      supabaseUrl:
        type: string
        description: Supabase project URL (optional — only needed for journey features)
      supabaseAnonKey:
        type: string
        description: Supabase anonymous key (optional — only needed for journey features)
      shrinkChatApiUrl:
        type: string
        description: Shrink-Chat API base URL for conversation features (e.g. https://couchloopchat.com)
    required:
      - jwtSecret
  exampleConfig:
    databaseUrl: postgresql://user:password@localhost:5432/couchloop
    jwtSecret: your-secret-key-minimum-32-characters-here
